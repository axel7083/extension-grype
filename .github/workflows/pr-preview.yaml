name: pr-preview.yaml

on:
  workflow_run:
    workflows:
      - 'pr-check'
    types:
      - completed

concurrency:
  group: ${{ github.workflow }}-${{ inputs.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-publish:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/oci-build.yaml
    if: ${{ github.event.workflow_run.pull_requests[0] != null }}
    with:
      ref: ${{ github.event.workflow_run.head_sha }}
      image: ${{ github.repository }}/pr
      tags: ${{ github.event.workflow_run.pull_requests[0].number }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  report:
    needs: build-publish
    runs-on: ubuntu-24.04
    permissions:
      checks: write
    steps:
      - name: Create report markdown
        run: |
          cat <<EOF > report.md
          ### OCI Preview Image

          \`${{ needs.build-publish.outputs.image-with-tag }}\`
          EOF

      - name: Publish check run
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          IMAGE: ${{ needs.build-publish.outputs.image-with-tag }}
        run: |
          ruby <<'EOF' | gh api repos/${{ github.repository }}/check-runs -X POST --input -
          require "json"

          report = {
            name: "OCI Preview Image",
            head_sha: ENV["HEAD_SHA"],
            status: "completed",
            conclusion: "success",
            output: {
              title: "Preview Image",
              summary: "OCI preview image built successfully.",
              text: "```\n#{ENV["IMAGE"]}\n```"
            }
          }

          puts JSON.generate(report)
          EOF